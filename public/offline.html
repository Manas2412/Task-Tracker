<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f4f0" />
    <title>Offline · MYAS</title>
    <style>
      /* Static fallback page — served straight from the service worker cache,
         so it cannot use the app's CSS pipeline. Values mirror the LIGHT
         theme tokens in src/styles/tokens.css. */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        font-family: 'Manrope', system-ui, -apple-system, sans-serif;
        background: #f5f4f0;
        color: #1a1a1a;
        display: grid;
        place-items: center;
        padding: 20px;
      }
      main {
        background: #ffffff;
        border: 1px solid #e8e6df;
        border-radius: 16px;
        box-shadow: 0 1px 2px rgba(26, 26, 26, 0.04), 0 1px 3px rgba(26, 26, 26, 0.06);
        max-width: 360px;
        width: 100%;
        padding: 28px 24px;
        text-align: center;
      }
      img {
        width: 64px;
        height: 64px;
        border-radius: 14px;
        border: 1px solid #efedf0;
      }
      h1 {
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 20px;
        font-weight: 500;
        margin-top: 16px;
        letter-spacing: -0.015em;
      }
      p {
        font-size: 13px;
        line-height: 1.5;
        color: #525252;
        margin-top: 8px;
      }
      button {
        font: inherit;
        font-size: 13px;
        font-weight: 500;
        margin-top: 20px;
        padding: 9px 18px;
        border: 0;
        border-radius: 8px;
        background: #1a1a1a;
        color: #ffffff;
        cursor: pointer;
      }
      button:hover { background: #525252; }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192.png" alt="" width="64" height="64" />
      <h1>You are offline</h1>
      <p>MYAS Task Tracker needs a connection. Check your network and try again.</p>
      <button type="button" onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
