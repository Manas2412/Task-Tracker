name: CI + Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: npx prisma generate
      - run: pnpm tsc --noEmit
      - run: pnpm next lint
      - run: pnpm audit --audit-level=high || true

  deploy:
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@2ead5e36573f08b82fbfce1504f1a4b05a647c6f # v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          # SSH key should use command= restriction in authorized_keys.
          # Rotate quarterly. Restrict inbound SSH to GitHub Actions IPs
          # via security group.
          script: |
            set -e
            cd /var/www/myas
            git pull origin main
            pnpm install --frozen-lockfile
            npx prisma generate
            npx prisma migrate deploy
            # tsconfig `include` hardcodes `.next/types/**/*.ts`, so the build's
            # type-check validates whatever sits in .next/types — NOT the fresh
            # .next-build/types this deploy writes. next build never prunes type
            # stubs for routes deleted from source, so a stale .next/types keeps
            # a stub for a gone route (e.g. attachments/[id]/print) and fails the
            # check. Clear both the prior build dir and the stale type stubs so
            # the type-check only sees current routes. .next/types is build-time
            # only (never served), so removing it can't disrupt the live app.
            rm -rf .next-build .next/types
            NEXT_BUILD_DIR=.next-build pnpm build
            rm -rf .next-old
            [ -d .next ] && mv .next .next-old
            mv .next-build .next
            pm2 restart myas
            sleep 5
            if ! curl -sf http://localhost:3000/api/auth/providers > /dev/null 2>&1; then
              echo "Health check failed — rolling back"
              pm2 stop myas
              rm -rf .next
              mv .next-old .next
              pm2 restart myas
              exit 1
            fi
